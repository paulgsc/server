
# NATS server configuration with JetStream enabled.
# Mounted read-only at /etc/nats/nats.conf inside the container.

# Listen on all interfaces (Docker networking).
listen: 0.0.0.0:4222

# HTTP monitoring endpoint (used by healthcheck + Prometheus scrape).
http: 0.0.0.0:8222

# ── JetStream ─────────────────────────────────────────────────────────────
jetstream {
  # Persist stream data to the named volume.
  store_dir: /data/jetstream

  # Total file storage budget for all streams (disk-backed).
  max_file_store: 4GB

  # In-memory stream budget (for fast, non-persistent streams).
  max_mem_store: 256MB
}

# ── Message limits ─────────────────────────────────────────────────────────
# Hard cap per message — mirrors store.MAX_PAYLOAD_BYTES (8 MB).
# Prevents oversized payloads from reaching the consumer at all.
max_payload: 8MB

# ── Logging ────────────────────────────────────────────────────────────────
# debug and trace are noisy; leave off in production.
# debug: false
# trace: false
logtime: true
